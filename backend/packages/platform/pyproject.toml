[project]
name = "crab-platform"
version = "0.1.0"
description = "Multi-tenant platform layer for Crab Harness"
requires-python = ">=3.12"
dependencies = [
    "deerflow-harness",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "bce-python-sdk>=0.9",
    "oss2>=2.18",
    "pyjwt[crypto]>=2.9",
    "bcrypt>=4.0",
    "redis[hiredis]>=5.2",
    "pydantic-settings>=2.7",
    "e2b>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crab_platform"]
